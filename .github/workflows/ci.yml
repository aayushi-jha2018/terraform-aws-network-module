name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: fmt / validate / plan
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform fmt check (entire repo)
        run: terraform fmt -check -recursive

      - name: Terraform init (root module)
        run: terraform init -backend=false

      - name: Terraform validate (root module)
        run: terraform validate

      - name: Terraform init (example)
        working-directory: examples/basic
        run: terraform init -backend=false

      - name: Terraform validate (example)
        working-directory: examples/basic
        run: terraform validate

      - name: Terraform plan (example, fake credentials, no cloud access)
        working-directory: examples/basic
        run: terraform plan -no-color
